<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>🤖 Robot Jump Game</title>
<style>
    body {
        text-align: center;
        font-family: Arial;
        background: #111;
        color: #fff;
    }

    canvas {
        background: #222;
        display: block;
        margin: 20px auto;
        border: 2px solid #555;
    }
</style>
</head>

<body>

<h2>🤖 Robot Jump Game</h2>
<p>กด SPACE เพื่อกระโดด</p>
<div id="score">Score: 0 | Life: 3</div>

<canvas id="gameCanvas" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ตัวละคร
let robot = {
    x: 50,
    y: 220,
    width: 40,
    height: 40,
    dy: 0,
    jumpForce: 12,
    gravity: 0.6,
    grounded: true
};

// เกม
let obstacles = [];
let score = 0;
let life = 3;
let speed = 4;
let spawnRate = 90; // ยิ่งน้อยยิ่งถี่
let frame = 0;
let gameOver = false;

// วาดหุ่นยนต์
function drawRobot(){
    ctx.fillStyle = "#00ffcc";
    ctx.fillRect(robot.x, robot.y, robot.width, robot.height);

    // ตา
    ctx.fillStyle = "#000";
    ctx.fillRect(robot.x+8, robot.y+10, 6, 6);
    ctx.fillRect(robot.x+26, robot.y+10, 6, 6);
}

// กระโดด
function jump(){
    if(robot.grounded){
        robot.dy = -robot.jumpForce;
        robot.grounded = false;
    }
}

// อัพเดตตัวละคร
function updateRobot(){
    robot.y += robot.dy;
    robot.dy += robot.gravity;

    if(robot.y >= 220){
        robot.y = 220;
        robot.dy = 0;
        robot.grounded = true;
    }
}

// สร้างสิ่งกีดขวาง
function spawnObstacle(){
    let height = 30 + Math.random()*20;

    obstacles.push({
        x: canvas.width,
        y: 260 - height,
        width: 20,
        height: height,
        passed: false
    });
}

// วาดสิ่งกีดขวาง
function drawObstacles(){
    ctx.fillStyle = "red";

    obstacles.forEach(o=>{
        ctx.fillRect(o.x, o.y, o.width, o.height);
    });
}

// อัพเดตสิ่งกีดขวาง
function updateObstacles(){
    obstacles.forEach(o=>{
        o.x -= speed;

        // นับคะแนน
        if(!o.passed && o.x < robot.x){
            score++;
            o.passed = true;
        }

        // ตรวจชน
        if(
            robot.x < o.x + o.width &&
            robot.x + robot.width > o.x &&
            robot.y < o.y + o.height &&
            robot.y + robot.height > o.y
        ){
            o.x = -100; // กันชนซ้ำ
            life--;

            if(life <= 0){
                gameOver = true;
            }
        }
    });

    // ลบอันที่ออกจอ
    obstacles = obstacles.filter(o => o.x > -50);
}

// เพิ่มความยาก
function increaseDifficulty(){
    if(frame % 300 === 0){
        speed += 0.5;
        if(spawnRate > 40){
            spawnRate -= 5;
        }
    }
}

// วาดพื้น
function drawGround(){
    ctx.fillStyle = "#888";
    ctx.fillRect(0, 260, canvas.width, 40);
}

// เกมหลัก
function gameLoop(){
    if(gameOver){
        ctx.fillStyle = "#fff";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", 280, 150);
        return;
    }

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawGround();
    drawRobot();
    drawObstacles();

    updateRobot();
    updateObstacles();

    // สุ่มเกิด
    if(frame % spawnRate === 0){
        spawnObstacle();
    }

    increaseDifficulty();

    document.getElementById("score").innerText =
        "Score: " + score + " | Life: " + life;

    frame++;
    requestAnimationFrame(gameLoop);
}

// ปุ่มกด
document.addEventListener("keydown", function(e){
    if(e.code === "Space"){
        jump();
    }
});

// เริ่มเกม
gameLoop();
</script>

</body>
</html>
